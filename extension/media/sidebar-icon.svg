<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Phone body -->
  <rect x="5" y="2" width="14" height="20" rx="3" stroke="currentColor" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="7.5" y="5" width="9" height="12" rx="1" fill="currentColor" opacity="0.3"/>
  <!-- Git branch dot - top -->
  <circle cx="12" cy="7" r="1.2" fill="currentColor"/>
  <!-- Git branch lines -->
  <line x1="12" y1="8.2" x2="12" y2="10" stroke="currentColor" stroke-width="1.2"/>
  <line x1="12" y1="10" x2="9.5" y2="12" stroke="currentColor" stroke-width="1.2"/>
  <line x1="12" y1="10" x2="14.5" y2="12" stroke="currentColor" stroke-width="1.2"/>
  <!-- Git branch dots - bottom -->
  <circle cx="9.5" cy="13.2" r="1.2" fill="currentColor"/>
  <circle cx="14.5" cy="13.2" r="1.2" fill="currentColor"/>
  <!-- Home button -->
  <circle cx="12" cy="19.5" r="1" stroke="currentColor" stroke-width="1"/>
</svg>
